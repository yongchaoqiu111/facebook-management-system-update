<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>账号登录 - Facebook管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .login-section {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 8px;
            margin-bottom: 30px;
            border: 1px solid #e9ecef;
            max-width: 500px;
            margin-left: auto;
            margin-right: auto;
        }
        
        .login-section h3 {
            margin-bottom: 20px;
            color: #34495e;
            text-align: center;
        }
        
        .platform-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .platform-btn {
            flex: 1;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 14px;
            font-weight: 500;
        }
        
        .platform-btn:hover {
            background: #e9ecef;
        }
        
        .platform-btn.active {
            background: #007bff;
            color: white;
            border-color: #007bff;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #495057;
        }
        
        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            transition: border-color 0.3s ease;
        }
        
        .form-input:focus {
            outline: none;
            border-color: #007bff;
            box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 4px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .btn-primary {
            background-color: #007bff;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #0056b3;
        }
        
        .btn-success {
            background-color: #28a745;
            color: white;
        }
        
        .btn-success:hover {
            background-color: #218838;
        }
        
        .btn-info {
            background-color: #17a2b8;
            color: white;
        }
        
        .btn-info:hover {
            background-color: #138496;
        }
        
        .btn:disabled {
            background-color: #6c757d;
            cursor: not-allowed;
        }
        
        .message {
            margin-top: 20px;
            padding: 12px;
            border-radius: 4px;
            font-size: 14px;
            text-align: center;
        }
        
        .message.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .message.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .cookie-info {
            margin-top: 20px;
            padding: 15px;
            background: #e9ecef;
            border-radius: 4px;
            font-size: 14px;
            color: #6c757d;
        }
        
        .cookie-path {
            font-family: 'Courier New', monospace;
            background: white;
            padding: 8px;
            border-radius: 4px;
            margin-top: 10px;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Facebook管理系统</h1>
            <nav>
                <a href="index.html">技能时间管理</a>
                <a href="login.html" class="active">账号登录</a>
                <a href="api-key.html">API Key设置</a>
                <a href="prompt-editor.html">提示词编辑</a>
                <a href="facebook-keywords.html">Facebook关键词管理</a>
                <a href="sixin-maintenance.html">私信维护</a>
                <a href="image-generation.html">文生图</a>
                <a href="comment-intercept.html">FB评论截流</a>
            </nav>
        </header>

        <main>
            <section class="login-manager">
                <h2>账号登录</h2>
                
                <div class="login-section">
                    <h3>选择平台</h3>
                    
                    <div class="platform-selector">
                        <button class="platform-btn active" onclick="selectPlatform('facebook', event)">Facebook</button>
                        <button class="platform-btn" onclick="selectPlatform('tiktok', event)">TikTok</button>
                    </div>
                    
                    <div class="button-group">
                        <button type="button" class="btn btn-primary" onclick="login()">登录</button>
                        <button type="button" class="btn btn-success" onclick="saveCookie()">保存Cookie</button>
                        <button type="button" class="btn btn-info" onclick="loginWithCookie()">携带Cookie登录</button>
                    </div>
                    
                    <div id="message" class="message" style="display: none;"></div>
                    
                    <div class="cookie-info">
                        <strong>Cookie保存路径：</strong>
                        <div class="cookie-path">D:\weibo\cookie</div>
                    </div>
                </div>
            </section>
        </main>

        <footer>
            <p>&copy; 2026 Facebook管理系统</p>
        </footer>
    </div>

    <script src="script.js"></script>
    <script>
        let selectedPlatform = 'facebook';

        // 选择平台
        function selectPlatform(platform, event) {
            selectedPlatform = platform;
            
            // 更新按钮状态
            document.querySelectorAll('.platform-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        // 登录
        async function login() {
            const messageElement = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        platform: selectedPlatform,
                        action: 'login'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showLoginMessage(messageElement, data.message || `${selectedPlatform}登录页面已打开，请在浏览器中输入账号密码`, 'success');
                } else {
                    showLoginMessage(messageElement, data.message || '打开登录页面失败', 'error');
                }
            } catch (error) {
                showLoginMessage(messageElement, '网络错误，请稍后重试', 'error');
                console.error('登录失败:', error);
            }
        }

        // 保存Cookie
        async function saveCookie() {
            const messageElement = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        platform: selectedPlatform,
                        action: 'saveCookie'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showLoginMessage(messageElement, data.message || `${selectedPlatform} Cookie保存成功`, 'success');
                } else {
                    showLoginMessage(messageElement, data.message || '保存Cookie失败', 'error');
                }
            } catch (error) {
                showLoginMessage(messageElement, '网络错误，请稍后重试', 'error');
                console.error('保存Cookie失败:', error);
            }
        }

        // 携带Cookie登录
        async function loginWithCookie() {
            const messageElement = document.getElementById('message');
            
            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        platform: selectedPlatform,
                        action: 'loginWithCookie'
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showLoginMessage(messageElement, data.message || `${selectedPlatform}已携带Cookie登录`, 'success');
                } else {
                    showLoginMessage(messageElement, data.message || '携带Cookie登录失败', 'error');
                }
            } catch (error) {
                showLoginMessage(messageElement, '网络错误，请稍后重试', 'error');
                console.error('携带Cookie登录失败:', error);
            }
        }

        // 显示消息
        function showLoginMessage(element, message, type) {
            element.textContent = message;
            element.className = `message ${type}`;
            element.style.display = 'block';
            
            // 5秒后自动隐藏
            setTimeout(() => {
                element.style.display = 'none';
            }, 5000);
        }
    </script>
</body>
</html>
